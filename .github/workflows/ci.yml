name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Verify production excludes E2E hooks
        run: |
          if rg --quiet "render_game_to_text" .next/static .next/server; then
            echo "Production bundle contains the E2E game-state hook"
            exit 1
          fi

      - name: Audit production dependencies
        run: pnpm run audit:prod

  database:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 16
        run: sudo apt-get update && sudo apt-get install --yes postgresql-16

      - name: Run database engine suite
        env:
          PGBIN: /usr/lib/postgresql/16/bin
        run: bash supabase/tests/run.sh

  browser:
    needs:
      - quality
      - database
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start isolated Supabase
        run: supabase start

      - name: Export local application environment
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            > .env.e2e
          set -a
          source .env.e2e
          set +a
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Verify generated database types
        run: |
          supabase gen types typescript --local --schema public > /tmp/database.types.ts
          diff --strip-trailing-cr src/lib/supabase/database.types.ts /tmp/database.types.ts

      - name: Start application
        env:
          NEXT_PUBLIC_E2E: "1"
        run: |
          pnpm run dev > /tmp/mafia-next.log 2>&1 &
          echo $! > /tmp/mafia-next.pid
          curl --fail --retry 40 --retry-delay 1 --retry-connrefused http://127.0.0.1:3000

      - name: Run multiplayer browser tests
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: pnpm run test:e2e

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts
          path: |
            test-results
            /tmp/mafia-next.log
          if-no-files-found: ignore

      - name: Stop isolated services
        if: always()
        run: |
          if [ -f /tmp/mafia-next.pid ]; then kill "$(cat /tmp/mafia-next.pid)" || true; fi
          supabase stop --no-backup || true
